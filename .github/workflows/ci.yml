name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm install

      - name: Install web deps
        run: npm --prefix apps/web install

      - name: Install api deps
        run: npm --prefix apps/api install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
