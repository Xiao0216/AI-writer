version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: wenshu_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wenshu_ai
      MYSQL_USER: wenshu
      MYSQL_PASSWORD: wenshu_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wenshu_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: wenshu_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wenshu_network
    command: redis-server --appendonly yes

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.15-community
    container_name: wenshu_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - wenshu_network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: wenshu_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wenshu_network
    command: server /data --console-address ":9001"

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wenshu_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: wenshu
      DB_PASSWORD: wenshu_password
      DB_DATABASE: wenshu_ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: neo4j_password
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - wenshu_network

  # 前端 Web
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: wenshu_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wenshu_network

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  minio_data:

networks:
  wenshu_network:
    driver: bridge
